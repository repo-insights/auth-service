                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
        - Users
      summary: Update Me
      operationId: update_me_api_v1_users_me_patch
      parameters:
        - name: authorization
          in: header
          required: false
